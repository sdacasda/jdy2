name: Build Athena AX6600 DAED

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "VIKINGYFY/immortalwrt branch, tag, or commit"
        required: true
        default: "main"
        type: string
      daede_ref:
        description: "kenzok8/openwrt-daede branch, tag, or commit"
        required: true
        default: "main"
        type: string
      build_mode:
        description: "Validate configuration or build firmware"
        required: true
        default: "validate"
        type: choice
        options: [validate, build]
      compile_jobs:
        description: "Parallel jobs; 2 is recommended"
        required: true
        default: "2"
        type: choice
        options: ["1", "2", "3"]
      publish_release:
        description: "Publish successful firmware to GitHub Releases"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: athena-daed-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: RE-CS-02 / DAED / BTF
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    env:
      SOURCE_REPO: https://github.com/VIKINGYFY/immortalwrt.git
      SOURCE_REF: ${{ inputs.source_ref }}
      DAEDE_REPO: https://github.com/kenzok8/openwrt-daede.git
      DAEDE_REF: ${{ inputs.daede_ref }}
      GEODATA_REPO: https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git
      GEODATA_REF: main
      LAN_IP: 192.168.50.1
      HOSTNAME: Athena-DAED
      COMPILE_JOBS: ${{ inputs.compile_jobs }}
      GOMAXPROCS: "2"
      CARGO_BUILD_JOBS: "2"
      MALLOC_ARENA_MAX: "2"

    steps:
      - name: Checkout clean builder
        uses: actions/checkout@v6

      - name: Normalize repository scripts
        run: |
          sed -i 's/\r$//' scripts/*.sh
          chmod +x scripts/*.sh
          bash -n scripts/*.sh

      - name: Validate repository before building
        run: |
          python3 scripts/project_check.py
          bash -n scripts/*.sh

      - name: Free disk and verify swap
        run: |
          set -euo pipefail

          sudo rm -rf             /usr/local/lib/android             /usr/share/dotnet             /opt/ghc             /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af || true

          echo "===== Existing swap ====="
          swapon --show || true

          # GitHub Ubuntu images normally already provide swap. Reuse it and
          # never rewrite an active /swapfile, which causes ETXTBSY.
          if [ -n "$(swapon --show --noheadings 2>/dev/null)" ]; then
            echo "Existing runner swap detected; no new swap file is needed."
          else
            FREE_GB="$(df --output=avail -BG "$RUNNER_TEMP" | tail -1 | tr -dc '0-9')"
            SWAP_GB=0

            if [ "${FREE_GB:-0}" -ge 20 ]; then
              SWAP_GB=8
            elif [ "${FREE_GB:-0}" -ge 12 ]; then
              SWAP_GB=4
            elif [ "${FREE_GB:-0}" -ge 8 ]; then
              SWAP_GB=2
            fi

            if [ "$SWAP_GB" -gt 0 ]; then
              SWAP_FILE="$RUNNER_TEMP/athena-build.swap"
              sudo rm -f "$SWAP_FILE"

              if ! sudo fallocate -l "${SWAP_GB}G" "$SWAP_FILE"; then
                echo "::warning::fallocate failed; falling back to dd."
                if ! sudo dd if=/dev/zero of="$SWAP_FILE"                     bs=1M count="$((SWAP_GB * 1024))" status=progress; then
                  echo "::warning::Unable to create fallback swap; continuing without it."
                  sudo rm -f "$SWAP_FILE"
                fi
              fi

              if [ -f "$SWAP_FILE" ]; then
                sudo chmod 600 "$SWAP_FILE"
                if sudo mkswap "$SWAP_FILE" && sudo swapon "$SWAP_FILE"; then
                  echo "Created ${SWAP_GB}G fallback swap at $SWAP_FILE."
                else
                  echo "::warning::Unable to activate fallback swap; continuing."
                  sudo rm -f "$SWAP_FILE"
                fi
              fi
            else
              echo "::warning::No existing swap and insufficient disk for fallback swap."
            fi
          fi

          sudo sysctl -w vm.swappiness=20 || true

          echo "===== Resources after cleanup ====="
          free -h
          swapon --show || true
          df -h / "$RUNNER_TEMP"

      - name: Install build dependencies without upgrading runner
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euo pipefail

          # Install only build dependencies. Keep the hosted runner's base OS,
          # package sources, Node.js, Go, GCC and LLVM unchanged.
          sudo apt-get -qq update
          sudo apt-get -qq install -y --no-install-recommends \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            build-essential bzip2 ccache clang cmake cpio curl \
            device-tree-compiler ecj fakeroot fastjar flex g++-multilib \
            gawk gcc-multilib gettext genisoimage git gnutls-dev gperf \
            haveged help2man intltool jq lib32gcc-s1 libc6-dev-i386 \
            libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev \
            libmpfr-dev libncurses-dev libpython3-dev libreadline-dev \
            libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz \
            msmtp nano ninja-build p7zip-full patch pkgconf \
            python3 python3-docutils python3-pip python3-ply \
            python3-pyelftools python3-setuptools qemu-utils quilt re2c \
            rsync scons sharutils squashfs-tools subversion swig texinfo \
            uglifyjs unzip wget xmlto xxd zlib1g-dev zstd dwarves file \
            openssl ca-certificates

          sudo timedatectl set-timezone Asia/Shanghai

          echo "===== Tool versions ====="
          gcc --version | head -1
          clang --version | head -1
          llvm-config --version
          pahole --version
          python3 --version
          git --version

          echo "===== Resource state ====="
          free -h
          swapon --show || true
          df -h /

      - name: Clone clean Athena source
        run: |
          set -euo pipefail
          git init -q openwrt
          git -C openwrt remote add origin "$SOURCE_REPO"
          git -C openwrt fetch -q --depth=1 origin "$SOURCE_REF"
          git -C openwrt checkout -q --detach FETCH_HEAD
          SOURCE_COMMIT="$(git -C openwrt rev-parse HEAD)"
          echo "SOURCE_COMMIT=$SOURCE_COMMIT" >> "$GITHUB_ENV"
          git -C openwrt log -1 --oneline

      - name: Audit upstream source
        run: |
          set -euo pipefail
          cd openwrt

          grep -q 'define Device/jdcloud_re-cs-02' target/linux/qualcommax/image/ipq60xx.mk
          grep -q 'TARGET_DEVICES += jdcloud_re-cs-02' target/linux/qualcommax/image/ipq60xx.mk

          CONFLICTS="$(
            grep -RIlE '^(<<<<<<< |>>>>>>> )' \
              target/linux package/kernel include 2>/dev/null || true
          )"
          if [ -n "$CONFLICTS" ]; then
            echo "::error::Unresolved source merge conflicts:"
            printf '%s\n' "$CONFLICTS"
            exit 1
          fi

          git diff --check

          TARGET_KERNEL="$(
            sed -n 's/^[[:space:]]*KERNEL_PATCHVER[[:space:]]*:=[[:space:]]*//p' \
              target/linux/qualcommax/Makefile | head -1 | tr -d '[:space:]'
          )"
          BPF_HEADERS_KERNEL="$(
            sed -n 's/^[[:space:]]*PKG_PATCHVER[[:space:]]*:=[[:space:]]*//p' \
              package/kernel/bpf-headers/Makefile | head -1 | tr -d '[:space:]'
          )"

          echo "TARGET_KERNEL=$TARGET_KERNEL" >> "$GITHUB_ENV"
          echo "BPF_HEADERS_KERNEL=$BPF_HEADERS_KERNEL" >> "$GITHUB_ENV"
          echo "target_kernel=$TARGET_KERNEL"
          echo "bpf_headers_kernel=$BPF_HEADERS_KERNEL"

      - name: Cache downloads and compiler cache
        uses: actions/cache@v4
        with:
          path: |
            openwrt/dl
            openwrt/.ccache
          key: athena-daed-${{ runner.os }}-${{ inputs.source_ref }}-${{ inputs.daede_ref }}-${{ hashFiles('config/athena-daed.config') }}
          restore-keys: |
            athena-daed-${{ runner.os }}-

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Inject DAED packages
        run: |
          bash scripts/prepare_packages.sh "$GITHUB_WORKSPACE/openwrt"

      - name: Apply device configuration
        run: |
          set -euo pipefail
          cd openwrt
          sed 's/\r$//' "$GITHUB_WORKSPACE/config/athena-daed.config" > .config
          bash "$GITHUB_WORKSPACE/scripts/apply_defaults.sh" "$GITHUB_WORKSPACE/openwrt"
          make defconfig
          bash "$GITHUB_WORKSPACE/scripts/verify_config.sh" .config
          cp .config "$GITHUB_WORKSPACE/athena-daed-final.config"

      - name: Verify host LLVM can emit eBPF
        run: |
          set -euo pipefail
          for tool in clang llc llvm-dis opt llvm-strip pahole; do
            command -v "$tool"
          done

          CLANG_MAJOR="$(
            clang -dM -E -x c /dev/null |
              awk '/__clang_major__/ {print $3; exit}'
          )"
          test -n "$CLANG_MAJOR"
          test "$CLANG_MAJOR" -ge 12

          printf 'int x;\n' |
            clang --target=bpfel -x c -c -o /tmp/clang-bpf-test.o -
          file /tmp/clang-bpf-test.o
          rm -f /tmp/clang-bpf-test.o

      - name: Stop after configuration validation
        if: ${{ inputs.build_mode == 'validate' }}
        run: |
          echo "Validation completed. Run again with build_mode=build."

      - name: Download source archives
        if: ${{ inputs.build_mode == 'build' }}
        run: |
          cd openwrt
          make download -j2
          find dl -type f -size -1024c -delete

      - name: Confirm standard OpenWrt build ordering
        if: ${{ inputs.build_mode == 'build' }}
        run: |
          set -euo pipefail
          cd openwrt

          # Do not invoke individual package compile targets here. The world
          # target must create host tools, toolchain and target state first.
          grep -q 'world: prepare' Makefile
          grep -q '\$(package/stamp-compile): \$(target/stamp-compile)' Makefile

          echo "Using standard dependency order:"
          echo "tools -> toolchain -> target -> packages -> images"

      - name: Compile firmware
        if: ${{ inputs.build_mode == 'build' }}
        run: |
          set -uo pipefail
          cd openwrt

          monitor_resources() {
            while sleep 60; do
              echo "===== resource heartbeat $(date -Iseconds) ====="
              free -h || true
              df -h / "$GITHUB_WORKSPACE" || true
              ps -eo pid,ppid,%cpu,%mem,rss,comm --sort=-rss | head -15 || true
            done
          }

          monitor_resources &
          MONITOR_PID=$!
          trap 'kill "$MONITOR_PID" 2>/dev/null || true' EXIT

          set +e
          make -j"$COMPILE_JOBS" world 2>&1 | tee "$GITHUB_WORKSPACE/build.log"
          RESULT=${PIPESTATUS[0]}

          if [ "$RESULT" -ne 0 ]; then
            echo "Parallel build failed; running one serial diagnostic pass."
            make -j1 V=s world 2>&1 | tee -a "$GITHUB_WORKSPACE/build.log"
            RESULT=${PIPESTATUS[0]}
          fi

          exit "$RESULT"

      - name: Collect firmware and diagnostics
        if: always()
        env:
          BUILD_RESULT: ${{ job.status }}
          BUILD_MODE: ${{ inputs.build_mode }}
        run: |
          mkdir -p "$GITHUB_WORKSPACE/output"
          {
            echo "job_status=${{ job.status }}"
            echo "build_mode=${{ inputs.build_mode }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_attempt=${{ github.run_attempt }}"
          } > "$GITHUB_WORKSPACE/output/WORKFLOW_STATUS.txt"

          bash scripts/collect_output.sh             "$GITHUB_WORKSPACE/openwrt"             "$GITHUB_WORKSPACE/output"

      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Athena-AX6600-DAED-${{ github.run_number }}
          path: output/
          if-no-files-found: warn
          retention-days: 14

      - name: Publish GitHub release
        if: ${{ success() && inputs.build_mode == 'build' && inputs.publish_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="athena-daed-$(date -u +'%Y.%m.%d')-${GITHUB_RUN_NUMBER}"
          gh release create "$TAG" output/* \
            --title "Athena AX6600 DAED $TAG" \
            --notes "RE-CS-02 DAED firmware. Review BUILD_INFO.txt and SHA256SUMS before flashing."
