name: Build Athena AX6600 Minimal DAED

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: "validate only, or build firmware"
        required: true
        default: "validate"
        type: choice
        options:
          - validate
          - build
      compile_jobs:
        description: "parallel jobs for the full build"
        required: true
        default: "2"
        type: choice
        options:
          - "1"
          - "2"

permissions:
  contents: read

env:
  SOURCE_REPO: https://github.com/LiBwrt/openwrt-6.x.git
  SOURCE_BRANCH: main-nss
  SOURCE_COMMIT: cf9444c1b20458687898489b36e1aebf56d9baf2
  KERNEL_SLOT_LIMIT: "6291456"
  DAEDE_REPO: https://github.com/kenzok8/openwrt-daede.git
  DAEDE_REF: main
  VMLINUX_BTF_REPO: https://github.com/kenzok8/vmlinux-btf.git
  VMLINUX_BTF_REF: main
  ATHENA_LED_REPO: https://github.com/NONGFAH/luci-app-athena-led.git
  ATHENA_LED_REF: main
  GOLANG_REPO: https://github.com/sbwml/packages_lang_golang.git
  GOLANG_REF: 26.x

jobs:
  build:
    name: RE-CS-02 / LiBwrt 6.12 / DAED / display
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout build project
        uses: actions/checkout@v4

      - name: Validate clean project
        run: |
          set -euo pipefail
          find scripts -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n
          python3 scripts/project_check.py

      - name: Free runner disk space
        run: |
          set -euo pipefail
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc || true
          sudo docker system prune --all --force || true
          df -h

      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk gcc-multilib \
            g++-multilib gettext git libncurses-dev libssl-dev \
            python3 python3-setuptools rsync swig unzip zlib1g-dev \
            file wget libelf-dev dwarves jq curl ca-certificates \
            subversion qemu-utils ccache xsltproc patch perl

      - name: Reuse or create swap
        run: |
          set -euo pipefail
          if swapon --show --noheadings | grep -q .; then
            swapon --show
          else
            sudo fallocate -l 8G /mnt/athena-swap
            sudo chmod 600 /mnt/athena-swap
            sudo mkswap /mnt/athena-swap
            sudo swapon /mnt/athena-swap
          fi
          free -h

      - name: Clone the exact known-good LiBwrt source commit
        run: |
          set -euo pipefail
          rm -rf openwrt
          mkdir openwrt
          git -C openwrt init
          git -C openwrt remote add origin "$SOURCE_REPO"
          git -C openwrt fetch --depth=1 origin "$SOURCE_COMMIT"
          git -C openwrt checkout --detach FETCH_HEAD

          ACTUAL="$(git -C openwrt rev-parse HEAD)"
          test "$ACTUAL" = "$SOURCE_COMMIT"
          echo "Pinned source commit: $ACTUAL"

      - name: Audit source, device and physical kernel limit
        working-directory: openwrt
        run: |
          set -euo pipefail

          grep -Eq 'KERNEL_PATCHVER[[:space:]]*:=[[:space:]]*6\.12' \
            target/linux/qualcommax/Makefile

          DEVICE_BLOCK="$(
            sed -n '/^define Device\/jdcloud_re-cs-02$/,/^endef$/p' \
              target/linux/qualcommax/image/ipq60xx.mk
          )"
          printf '%s\n' "$DEVICE_BLOCK"

          KERNEL_SIZE_VALUE="$(
            printf '%s\n' "$DEVICE_BLOCK" |
              awk -F':=' '
                /^[[:space:]]*KERNEL_SIZE[[:space:]]*:=/ {
                  gsub(/[[:space:]]/, "", $2)
                  print $2
                  exit
                }
              '
          )"

          if [ "$KERNEL_SIZE_VALUE" != "6144k" ]; then
            echo "::error::Unexpected RE-CS-02 KERNEL_SIZE: ${KERNEL_SIZE_VALUE:-missing}"
            exit 1
          fi
          echo "RE-CS-02 physical kernel slot confirmed: $KERNEL_SIZE_VALUE"

      - name: Update source feeds
        working-directory: openwrt
        run: |
          set -euo pipefail
          ./scripts/feeds update -a

      - name: Add DAED, detached BTF and Athena display packages
        run: |
          set -euo pipefail
          bash scripts/prepare_packages.sh "$GITHUB_WORKSPACE/openwrt"

      - name: Install feed package indexes
        working-directory: openwrt
        run: |
          set -euo pipefail
          ./scripts/feeds install -a -f

      - name: Apply minimal defaults
        run: |
          set -euo pipefail
          bash scripts/apply_defaults.sh "$GITHUB_WORKSPACE/openwrt"

      - name: Apply and validate device configuration
        working-directory: openwrt
        run: |
          set -euo pipefail
          cp "$GITHUB_WORKSPACE/config/athena-minimal.config" .config
          make defconfig
          bash "$GITHUB_WORKSPACE/scripts/verify_config.sh" .config
          ./scripts/diffconfig.sh

      - name: Download build sources
        if: inputs.build_mode == 'build'
        working-directory: openwrt
        run: |
          set -euo pipefail
          make download -j8 || make download -j1 V=s
          find dl -type f -size -1024c -delete || true

      - name: Compile firmware
        id: compile
        if: inputs.build_mode == 'build'
        continue-on-error: true
        working-directory: openwrt
        run: |
          set -o pipefail
          JOBS="${{ inputs.compile_jobs }}"
          make -j"$JOBS" world 2>&1 | tee "$GITHUB_WORKSPACE/build.log"
          RC="${PIPESTATUS[0]}"

          if [ "$RC" -ne 0 ] && [ "$JOBS" != "1" ]; then
            echo "Parallel build failed; retrying serially with verbose output."
            make -j1 V=s world 2>&1 | tee -a "$GITHUB_WORKSPACE/build.log"
            RC="${PIPESTATUS[0]}"
          fi

          echo "build_rc=$RC" >> "$GITHUB_OUTPUT"
          exit "$RC"

      - name: Report persistent kernel image size
        if: always() && inputs.build_mode == 'build'
        run: |
          set -euo pipefail
          IMAGE="$(
            find "$GITHUB_WORKSPACE/openwrt/build_dir" -type f \
              -name 'jdcloud_re-cs-02-uImage.itb' -print -quit 2>/dev/null || true
          )"

          if [ -n "$IMAGE" ] && [ -f "$IMAGE" ]; then
            SIZE="$(stat -c '%s' "$IMAGE")"
            MARGIN="$((KERNEL_SLOT_LIMIT - SIZE))"
            echo "persistent uImage.itb: $SIZE bytes"
            echo "physical HLOS limit:   $KERNEL_SLOT_LIMIT bytes"
            echo "remaining margin:      $MARGIN bytes"

            if [ "$SIZE" -gt "$KERNEL_SLOT_LIMIT" ]; then
              echo "::error::Persistent kernel is oversized by $((-MARGIN)) bytes."
              exit 1
            fi
          else
            echo "::warning::No persistent RE-CS-02 uImage.itb was produced."
          fi

      - name: Collect firmware and diagnostics
        if: always()
        run: |
          set -euo pipefail
          bash scripts/collect_output.sh \
            "$GITHUB_WORKSPACE/openwrt" \
            "$GITHUB_WORKSPACE/output"
          cp -a build.log output/diagnostics/ 2>/dev/null || true

      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Athena-AX6600-Minimal-DAED-${{ github.run_number }}
          path: output/
          if-no-files-found: error
          retention-days: 14
          compression-level: 6

      - name: Mark failed compilation
        if: inputs.build_mode == 'build' && steps.compile.outcome == 'failure'
        run: |
          echo "::error::Firmware compilation failed. Download the artifact for build.log."
          exit 1
