name: Build Athena RAM Diagnostic

on:
  workflow_dispatch:
    inputs:
      compile_jobs:
        description: "parallel build jobs"
        required: true
        default: "2"
        type: choice
        options:
          - "1"
          - "2"

permissions:
  contents: read

env:
  SOURCE_REPO: https://github.com/LiBwrt/openwrt-6.x.git
  SOURCE_COMMIT: cf9444c1b20458687898489b36e1aebf56d9baf2

jobs:
  build:
    name: RE-CS-02 RAM-only baseline
    runs-on: ubuntu-22.04
    timeout-minutes: 300

    steps:
      - name: Checkout diagnostic project
        uses: actions/checkout@v4

      - name: Validate project
        run: |
          set -euo pipefail
          find scripts -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n
          python3 scripts/project_check.py

      - name: Free disk
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc || true
          sudo docker system prune --all --force || true
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk gcc-multilib \
            g++-multilib gettext git libncurses-dev libssl-dev \
            python3 python3-setuptools rsync swig unzip zlib1g-dev \
            file wget libelf-dev jq curl ca-certificates \
            subversion ccache xsltproc patch perl

      - name: Clone exact stable LiBwrt source
        run: |
          set -euo pipefail
          rm -rf openwrt
          mkdir openwrt
          git -C openwrt init
          git -C openwrt remote add origin "$SOURCE_REPO"
          git -C openwrt fetch --depth=1 origin "$SOURCE_COMMIT"
          git -C openwrt checkout --detach FETCH_HEAD
          test "$(git -C openwrt rev-parse HEAD)" = "$SOURCE_COMMIT"

      - name: Update and install feeds
        working-directory: openwrt
        run: |
          set -euo pipefail
          ./scripts/feeds update -a
          ./scripts/feeds install -a -f

      - name: Inject emergency network and status page
        run: |
          bash scripts/inject_diagnostic.sh "$GITHUB_WORKSPACE/openwrt"

      - name: Apply diagnostic configuration
        working-directory: openwrt
        run: |
          set -euo pipefail
          cp "$GITHUB_WORKSPACE/config/athena-ram-diagnostic.config" .config
          make defconfig
          bash "$GITHUB_WORKSPACE/scripts/verify_config.sh" .config

      - name: Download sources
        working-directory: openwrt
        run: |
          make download -j8 || make download -j1 V=s
          find dl -type f -size -1024c -delete || true

      - name: Compile RAM-only diagnostic
        id: compile
        continue-on-error: true
        working-directory: openwrt
        run: |
          set -o pipefail
          JOBS="${{ inputs.compile_jobs }}"

          make -j"$JOBS" world 2>&1 | tee "$GITHUB_WORKSPACE/build.log"
          RC="${PIPESTATUS[0]}"

          if [ "$RC" -ne 0 ] && [ "$JOBS" != "1" ]; then
            echo "Parallel build failed; retrying once with serial verbose output."
            make -j1 V=s world 2>&1 | tee -a "$GITHUB_WORKSPACE/build.log"
            RC="${PIPESTATUS[0]}"
          fi

          echo "build_rc=$RC" >> "$GITHUB_OUTPUT"
          exit "$RC"

      - name: Extract the first useful build errors
        if: always()
        run: |
          set -euo pipefail
          mkdir -p output
          if [ -f build.log ]; then
            {
              echo "=== first ERROR lines ==="
              grep -nE 'ERROR:|check_data_file_clashes|conflicts:|failed to write database|Cannot install package' \
                build.log | head -n 80 || true
              echo
              echo "=== final 250 lines ==="
              tail -n 250 build.log
            } > output/ERROR_CONTEXT.txt
          else
            echo "build.log was not created" > output/ERROR_CONTEXT.txt
          fi

      - name: Collect the initramfs image and diagnostics
        if: always()
        run: |
          set -euo pipefail
          bash scripts/collect_output.sh \
            "$GITHUB_WORKSPACE/openwrt" \
            "$GITHUB_WORKSPACE/output-collected"

          cp -a output-collected/. output/
          cp -a build.log output/ 2>/dev/null || true

          # No persistent firmware may leave this workflow.
          if find output -type f \
              \( -name '*sysupgrade*' -o -name '*factory*' -o -name '*.img' \) \
              | grep -q .; then
            echo "::error::No persistent firmware is allowed in this artifact."
            exit 1
          fi

      - name: Upload RAM diagnostic artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Athena-AX6600-RAM-Diagnostic-${{ github.run_number }}
          path: output/
          retention-days: 14
          if-no-files-found: error
          compression-level: 6

      - name: Mark failed compilation
        if: steps.compile.outcome == 'failure'
        run: |
          echo "::error::Compilation failed. Download ERROR_CONTEXT.txt and build.log from the artifact."
          exit 1
