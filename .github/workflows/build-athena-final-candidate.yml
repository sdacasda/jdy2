name: Build Athena DAED WOL Final Candidate

on:
  workflow_dispatch:
    inputs:
      compile_jobs:
        description: "parallel build jobs"
        required: true
        default: "2"
        type: choice
        options:
          - "1"
          - "2"

permissions:
  contents: read

env:
  SOURCE_REPO: https://github.com/LiBwrt/openwrt-6.x.git
  SOURCE_COMMIT: cf9444c1b20458687898489b36e1aebf56d9baf2
  KERNEL_SLOT_LIMIT: "6291456"
  DAEDE_REPO: https://github.com/kenzok8/openwrt-daede.git
  DAEDE_REF: v2026.07.09
  VMLINUX_BTF_REPO: https://github.com/kenzok8/vmlinux-btf.git
  VMLINUX_BTF_REF: main
  ATHENA_LED_REPO: https://github.com/NONGFAH/luci-app-athena-led.git
  ATHENA_LED_REF: main
  GOLANG_REPO: https://github.com/sbwml/packages_lang_golang.git
  GOLANG_REF: 26.x

jobs:
  build:
    name: RE-CS-02 / DAED + display + WOL
    runs-on: ubuntu-22.04
    timeout-minutes: 420

    steps:
      - name: Checkout build project
        uses: actions/checkout@v4

      - name: Validate project
        run: |
          set -euo pipefail
          find scripts -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n
          python3 scripts/project_check.py

      - name: Free runner disk space
        run: |
          set -euo pipefail
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc || true
          sudo docker system prune --all --force || true
          df -h

      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk gcc-multilib \
            g++-multilib gettext git libncurses-dev libssl-dev \
            python3 python3-setuptools rsync swig unzip zlib1g-dev \
            file wget libelf-dev dwarves jq curl ca-certificates \
            subversion qemu-utils ccache xsltproc patch perl

      - name: Reuse or create swap
        run: |
          set -euo pipefail
          if swapon --show --noheadings | grep -q .; then
            swapon --show
          else
            sudo fallocate -l 8G /mnt/athena-swap
            sudo chmod 600 /mnt/athena-swap
            sudo mkswap /mnt/athena-swap
            sudo swapon /mnt/athena-swap
          fi
          free -h

      - name: Clone exact stable LiBwrt source
        run: |
          set -euo pipefail
          rm -rf openwrt
          mkdir openwrt
          git -C openwrt init
          git -C openwrt remote add origin "$SOURCE_REPO"
          git -C openwrt fetch --depth=1 origin "$SOURCE_COMMIT"
          git -C openwrt checkout --detach FETCH_HEAD
          test "$(git -C openwrt rev-parse HEAD)" = "$SOURCE_COMMIT"

      - name: Audit source and physical kernel limit
        working-directory: openwrt
        run: |
          set -euo pipefail
          grep -Eq 'KERNEL_PATCHVER[[:space:]]*:=[[:space:]]*6\.12' target/linux/qualcommax/Makefile
          DEVICE_BLOCK="$(sed -n '/^define Device\/jdcloud_re-cs-02$/,/^endef$/p' target/linux/qualcommax/image/ipq60xx.mk)"
          printf '%s\n' "$DEVICE_BLOCK"
          KERNEL_SIZE_VALUE="$(printf '%s\n' "$DEVICE_BLOCK" | awk -F':=' '/^[[:space:]]*KERNEL_SIZE[[:space:]]*:=/ {gsub(/[[:space:]]/, "", $2); print $2; exit}')"
          test "$KERNEL_SIZE_VALUE" = "6144k"

      - name: Cache downloads and compiler cache
        uses: actions/cache@v4
        with:
          path: |
            openwrt/dl
            openwrt/.ccache
          key: athena-final-v18-${{ runner.os }}-${{ env.SOURCE_COMMIT }}
          restore-keys: |
            athena-final-v18-${{ runner.os }}-

      - name: Update source feeds
        working-directory: openwrt
        run: |
          set -euo pipefail
          ./scripts/feeds update -a

      - name: Add DAED, detached BTF and display packages
        run: |
          set -euo pipefail
          bash scripts/prepare_packages.sh "$GITHUB_WORKSPACE/openwrt"

      - name: Install feed package indexes
        working-directory: openwrt
        run: |
          set -euo pipefail
          ./scripts/feeds install -a -f

      - name: Inject safe RAM diagnostics and defaults
        run: |
          set -euo pipefail
          bash scripts/inject_runtime.sh "$GITHUB_WORKSPACE/openwrt"

      - name: Apply and validate configuration
        working-directory: openwrt
        run: |
          set -euo pipefail
          cp "$GITHUB_WORKSPACE/config/athena-final-candidate.config" .config
          make defconfig
          bash "$GITHUB_WORKSPACE/scripts/verify_config.sh" .config package/custom/daed/Makefile
          ./scripts/diffconfig.sh

      - name: Download build sources
        working-directory: openwrt
        run: |
          set -euo pipefail
          make download -j8 || make download -j1 V=s
          find dl -type f -size -1024c -delete || true

      - name: Compile both images
        id: compile
        continue-on-error: true
        working-directory: openwrt
        run: |
          set -o pipefail
          JOBS="${{ inputs.compile_jobs }}"
          make -j"$JOBS" world 2>&1 | tee "$GITHUB_WORKSPACE/build.log"
          RC="${PIPESTATUS[0]}"
          if [ "$RC" -ne 0 ] && [ "$JOBS" != "1" ]; then
            echo "Parallel build failed; retrying serially with verbose output."
            make -j1 V=s world 2>&1 | tee -a "$GITHUB_WORKSPACE/build.log"
            RC="${PIPESTATUS[0]}"
          fi
          echo "build_rc=$RC" >> "$GITHUB_OUTPUT"
          exit "$RC"

      - name: Report persistent kernel size
        if: always()
        run: |
          set -euo pipefail
          IMAGE="$(find "$GITHUB_WORKSPACE/openwrt/build_dir" -type f -name 'jdcloud_re-cs-02-uImage.itb' -print -quit 2>/dev/null || true)"
          if [ -n "$IMAGE" ] && [ -f "$IMAGE" ]; then
            SIZE="$(stat -c '%s' "$IMAGE")"
            MARGIN="$((KERNEL_SLOT_LIMIT - SIZE))"
            echo "persistent uImage.itb: $SIZE bytes"
            echo "physical HLOS limit:   $KERNEL_SLOT_LIMIT bytes"
            echo "remaining margin:      $MARGIN bytes"
            if [ "$SIZE" -gt "$KERNEL_SLOT_LIMIT" ]; then
              echo "::error::Persistent kernel is oversized by $((-MARGIN)) bytes."
              exit 1
            fi
          else
            echo "::warning::No persistent kernel image was produced."
          fi

      - name: Extract useful error context
        if: always()
        run: |
          set -euo pipefail
          mkdir -p pre-output
          if [ -f build.log ]; then
            {
              echo "=== first useful error lines ==="
              grep -nE 'ERROR:|check_data_file_clashes|conflicts:|Cannot install package|Kernel image .* too big|Error [0-9]+' build.log | head -n 120 || true
              echo
              echo "=== final 300 lines ==="
              tail -n 300 build.log
            } > pre-output/ERROR_CONTEXT.txt
          else
            echo "build.log was not created" > pre-output/ERROR_CONTEXT.txt
          fi

      # Artifact includes initramfs-uImage.itb and squashfs-sysupgrade.bin.
      - name: Collect both images and diagnostics
        if: always()
        run: |
          set -euo pipefail
          bash scripts/collect_output.sh "$GITHUB_WORKSPACE/openwrt" "$GITHUB_WORKSPACE/output"
          cp -a pre-output/. output/diagnostics/ 2>/dev/null || true
          cp -a build.log output/diagnostics/ 2>/dev/null || true
          cp -a scripts/verify_after_flash.sh output/verify-after-flash.sh 2>/dev/null || true

      - name: Upload one artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Athena-AX6600-DAED-WOL-Final-Candidate-${{ github.run_number }}
          path: output/
          retention-days: 14
          if-no-files-found: error
          compression-level: 6

      - name: Mark failed compilation
        if: steps.compile.outcome == 'failure'
        run: |
          echo "::error::Compilation failed. Download build.log and ERROR_CONTEXT.txt."
          exit 1
