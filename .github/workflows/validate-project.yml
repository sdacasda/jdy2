name: Validate Athena Minimal Project

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/**"
      - "config/**"
      - "scripts/**"
      - "PROJECT.json"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Validate shell, Python, YAML and project invariants
        run: |
          set -euo pipefail
          find scripts -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n
          python3 -m py_compile scripts/project_check.py
          python3 scripts/project_check.py
          python3 - <<'PY'
          from pathlib import Path
          import yaml
          for path in Path(".github/workflows").glob("*.yml"):
              data = yaml.safe_load(path.read_text(encoding="utf-8"))
              if not isinstance(data, dict):
                  raise SystemExit(f"invalid workflow: {path}")
              print(f"YAML OK: {path}")
          PY
