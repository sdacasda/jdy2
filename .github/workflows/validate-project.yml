name: Validate clean project

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/**"
      - "config/**"
      - "scripts/**"
      - "PROJECT.json"
  pull_request:
    paths:
      - ".github/**"
      - "config/**"
      - "scripts/**"
      - "PROJECT.json"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Install validation tools
        run: |
          sudo apt-get -qq update
          sudo apt-get -qq install -y shellcheck

      - name: Run project consistency checks
        run: |
          python3 scripts/project_check.py
          shellcheck --severity=warning scripts/*.sh
          bash -n scripts/*.sh
